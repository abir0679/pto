<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Live Call - Connect Directly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0055;
            --primary-hover: #e6004c;
            --dark: #090d16;
            --glass: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #ffffff;
            padding-bottom: 40px;
        }

        /* Header section */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(255, 0, 85, 0.15), transparent);
            border-bottom: 1px solid rgba(255, 0, 85, 0.1);
        }

        .profile-container { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .online-badge { position: absolute; bottom: 5px; right: 5px; background: #22c55e; color: white; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 2px solid var(--dark); }

        h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .sub-text { color: #94a3b8; font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.4; }

        /* Form/Inbox Card */
        .inbox-wrapper { max-width: 500px; margin: 30px auto; padding: 0 20px; }
        .inbox-card { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border); border-radius: 20px; padding: 25px; text-align: center; }
        .inbox-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .input-group input { flex: 1; background: transparent; border: none; padding: 10px 15px; color: white; font-size: 14px; outline: none; }
        .submit-btn { background: var(--primary); color: white; border: none; padding: 10px 22px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .submit-btn:hover { background: var(--primary-hover); }

        /* Notification message */
        .status-msg { margin-top: 15px; padding: 12px; border-radius: 12px; font-size: 13.5px; line-height: 1.4; display: none; text-align: left; }

        /* Gallery Grid */
        .gallery-heading { max-width: 1000px; margin: 40px auto 15px; padding: 0 20px; font-size: 14px; text-transform: uppercase; color: #64748b; }
        .gallery-container { max-width: 1000px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .video-card { background: var(--glass); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); position: relative; cursor: pointer; transition: transform 0.2s;}
        .video-card:hover { transform: scale(1.02); border-color: var(--primary); }
        .thumbnail { width: 100%; aspect-ratio: 9/16; background: #111827; display: flex; align-items: center; justify-content: center; position: relative; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; position: absolute; top: 0; left: 0;}
        .play-btn { position: absolute; background: var(--primary); width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255, 0, 85, 0.4); z-index: 2;}
        .play-triangle { width: 0; height: 0; border-top: 9px solid transparent; border-left: 15px solid white; border-bottom: 9px solid transparent; margin-left: 5px; }
        .video-info { padding: 10px; font-size: 12px; text-align: center; background: rgba(0, 0, 0, 0.8); font-weight: 600; color: #ff4d6d; position: relative; z-index: 2;}

        @media (max-width: 480px) { .gallery-container { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-container">
            <img src="https://github.com/mizan000321-ops/newv/blob/main/G3UZgO_XMAAzE6N.jpg?raw=true" class="profile-img" alt="Profile">
            <span class="online-badge">ONLINE</span>
        </div>
        <h1>Connect with Me Live</h1>
        <p class="sub-text">Join the room to start a secure, private session.</p>
    </div>

    <div class="inbox-wrapper">
        <div class="inbox-card">
            <div class="inbox-title">Enter Your Registered Name:</div>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Type your username here...">
                <button class="submit-btn" onclick="handleSubmit()">Connect</button>
            </div>
            <div id="statusBox" class="status-msg"></div>
        </div>
    </div>

    <div class="gallery-heading">Available Sessions</div>
    <div class="gallery-container">
        
        <div class="video-card">
            <div class="thumbnail">
                <img src="https://github.com/mizan000321-ops/newv/blob/main/G3UZgO_XMAAzE6N.jpg?raw=true" class="thumb-img" alt="Session">
                <div class="play-btn"><div class="play-triangle"></div></div>
            </div>
            <div class="video-info">Session #1</div>
        </div>

        <div class="video-card">
            <div class="thumbnail">
                <img src="https://github.com/mizan000321-ops/newv/blob/main/GoWoZl9X0AA1I6V.jpg?raw=true" class="thumb-img" alt="Session">
                <div class="play-btn"><div class="play-triangle"></div></div>
            </div>
            <div class="video-info">Session #2</div>
        </div>

        <div class="video-card">
            <div class="thumbnail">
                <img src="https://github.com/mizan000321-ops/newv/blob/main/Gv2LKn_XwAAsWou.jpg?raw=true" class="thumb-img" alt="Session">
                <div class="play-btn"><div class="play-triangle"></div></div>
            </div>
            <div class="video-info">Session #3</div>
        </div>
        
    </div>

            var name = document.getElementById("usernameInput").value.trim();
            var statusBox = document.getElementById("statusBox");

                statusBox.innerHTML = "⚠️ Please enter your username first!";
            } else {
                statusBox.style.display = "block";
                statusBox.style.backgroundColor = "#fffbeb";
                statusBox.style.color = "#b45309";
                statusBox.style.borderLeft = "4px solid #f59e0b";
                statusBox.innerHTML = "⏳ <strong>
