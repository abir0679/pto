<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 VIP Member Portal - Private Live Access</title>
    <style>
        /* Premium Dark & Hot-Pink Theme */
        :root {
            --primary: #ff0055;
            --primary-hover: #e6004c;
            --secondary: #1e293b;
            --dark: #090d16;
            --glass: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            padding-bottom: 60px;
        }

        /* Top Header */
        .header {
            text-align: center;
            padding: 40px 20px 25px;
            background: linear-gradient(to bottom, rgba(255, 0, 85, 0.2), transparent);
            border-bottom: 1px solid rgba(255, 0, 85, 0.1);
        }

        .profile-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.6);
        }

        .online-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #22c55e;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            border: 2px solid var(--dark);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .sub-text { color: #94a3b8; font-size: 14px; max-width: 450px; margin: 0 auto; line-height: 1.5; }

        /* Real-time Interactive Inbox Box Section */
        .inbox-wrapper {
            max-width: 500px;
            margin: 25px auto;
            padding: 0 20px;
        }

        .inbox-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .inbox-title {
            font-size: 15px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .inbox-p {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 15px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-group input::placeholder { color: #64748b; }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover { background: var(--primary-hover); }

        .status-msg {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13.5px;
            line-height: 1.5;
            display: none;
            text-align: center;
        }

        /* Block-Level Link Buttons */
        .cta-container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .main-link-btn {
            display: block !important;
            width: 100% !important;
            box-sizing: border-box !important;
            background: linear-gradient(135deg, #ff0055 0%, #ff4d6d 100%) !important;
            color: #ffffff !important;
            text-decoration: none !important;
            text-align: center !important;
            padding: 18px 20px !important;
            border-radius: 50px !important;
            font-size: 16px !important;
            font-weight: 800 !important;
            letter-spacing: 0.5px !important;
            box-shadow: 0 8px 25px rgba(255, 0, 85, 0.4) !important;
            transition: transform 0.2s, opacity 0.2s !important;
            margin: 15px 0 !important;
        }

        .main-link-btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        /* Gallery Grid Layout */
        .gallery-heading {
            max-width: 1000px;
            margin: 40px auto 15px;
            padding: 0 20px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
        }

        .gallery-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .video-card {
            background: var(--glass);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s, border-color 0.3s;
            color: white;
            position: relative;
            display: block;
            cursor: pointer;
        }

        .video-card:hover {
            transform: scale(1.04);
            border-color: var(--primary);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 9/16;
            background: #111827;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .thumb-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7; 
        }

        .play-btn {
            position: absolute;
            background: var(--primary);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.5);
            z-index: 2;
        }

        .play-triangle {
            width: 0;
            height: 0;
            border-top: 9px solid transparent;
            border-left: 15px solid white;
            border-bottom: 9px solid transparent;
            margin-left: 5px;
        }

        .video-info {
            padding: 10px;
            font-size: 12px;
            text-align: center;
            background: rgba(0, 0, 0, 0.75);
            font-weight: 600;
            position: relative;
            z-index: 2;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 480px) {
            .gallery-container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
